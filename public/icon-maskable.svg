<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- QLSS maskable icon — 512x512 — content kept within ~70% safe zone -->
  <!-- Maskable icons get cropped by the OS to circle/squircle/etc., so we
       add generous padding (no rounded corners, full-bleed background). -->
  <rect width="512" height="512" fill="#0a0a09"/>
  <!-- "Q" letter — centered vertically/horizontally in safe zone -->
  <text x="160" y="316" font-family="'Roboto Mono', ui-monospace, monospace" font-weight="700" font-size="200" fill="#fbfbf9">Q</text>
  <!-- Link bars — to the right of the Q -->
  <line x1="312" y1="200" x2="372" y2="200" stroke="#fbfbf9" stroke-width="20" stroke-linecap="round"/>
  <line x1="312" y1="250" x2="338" y2="250" stroke="#fbfbf9" stroke-width="20" stroke-linecap="round"/>
  <line x1="312" y1="300" x2="388" y2="300" stroke="#fbfbf9" stroke-width="20" stroke-linecap="round"/>
  <line x1="312" y1="350" x2="350" y2="350" stroke="#fbfbf9" stroke-width="20" stroke-linecap="round"/>
</svg>
